when:
    - event: ["push", "manual"]
      branch: ["main", "feat/*", "fix/*"]

engine: "nixery"

clone:
    depth: 0

dependencies:
    nixpkgs:
        - git

steps:
    - name: "Mirror to GitHub"
      command: |
          git fetch --unshallow origin || true
          git remote add github "https://x-access-token:${GITHUB_PAT}@github.com/daniel-daum/kaneo.git"
          git push github "HEAD:refs/heads/${TANGLED_REF_NAME}" --force
      environment:
          GITHUB_PAT: "${{ secrets.GITHUB_PAT }}"
